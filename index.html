<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#141e30" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>PythonQuest</title>
    <!-- Google Fonts: Press Start 2P -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js"></script>
    <script>
      function scaleGame() {
        var root = document.getElementById('root');
        if (!root) return;
        var GAME_W = 480;
        var GAME_H = 500;
        var scaleX = window.innerWidth  / GAME_W;
        var scaleY = window.innerHeight / GAME_H;
        // Mobile portrait: usa largura para preencher a tela horizontalmente
        // Desktop: usa o menor para não cortar
        var isMobile = window.innerWidth < 600;
        var scale = isMobile ? scaleX : Math.min(scaleX, scaleY);
        root.style.transform = 'scale(' + scale + ')';
      }
      window.addEventListener('load', scaleGame);
      window.addEventListener('resize', scaleGame);
      window.addEventListener('orientationchange', function() {
        setTimeout(scaleGame, 150);
      });

      // Bloqueia zoom por pinça e duplo toque
      document.addEventListener('touchstart', function(e) {
        if (e.touches.length > 1) e.preventDefault();
      }, { passive: false });

      var lastTap = 0;
      document.addEventListener('touchend', function(e) {
        var now = Date.now();
        if (now - lastTap < 300) e.preventDefault();
        lastTap = now;
      }, { passive: false });

      // iOS Safari
      document.addEventListener('gesturestart',  function(e) { e.preventDefault(); }, { passive: false });
      document.addEventListener('gesturechange', function(e) { e.preventDefault(); }, { passive: false });
      document.addEventListener('gestureend',    function(e) { e.preventDefault(); }, { passive: false });

      // Bloqueia wheel zoom (trackpad/desktop)
      window.addEventListener('wheel', function(e) {
        if (e.ctrlKey) e.preventDefault();
      }, { passive: false });

      // Reseta o viewport se o zoom mudar — força voltar para scale 1.0
      function resetViewportZoom() {
        var viewport = document.querySelector('meta[name=viewport]');
        if (!viewport) return;
        // Força reset removendo e readicionando o meta tag
        viewport.setAttribute('content', 'width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover');
        scaleGame();
      }

      // Detecta mudança de zoom pelo visualViewport
      if (window.visualViewport) {
        window.visualViewport.addEventListener('resize', function() {
          // Se o scale do viewport mudou, reseta
          if (Math.abs(window.visualViewport.scale - 1.0) > 0.05) {
            resetViewportZoom();
          }
        });
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
